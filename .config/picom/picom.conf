# --- Backend (Critical for IdeaPad 3) ---
backend = "glx";
use-damage = true;
vsync = true;

# --- Corners (Performance Adjusted) ---
# Reduced radius for better rendering performance
corner-radius = 8;

# --- Shadows (Disabled or Minimal for Performance) ---
# Shadows consume significant GPU memory and CPU cycles on dual-core machines.
shadow = false;
shadow-radius = 7;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.5;

# === ADD THESE EXCLUSIONS HERE ===
# This stops Conky from ghosting/double-printing
shadow-exclude = [
  "class_g = 'Conky'"
];

blur-background-exclude = [
  "class_g = 'Conky'"
];

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Conky'"
];

# --- Specific Rules for i3 ---
detect-rounded-corners = true;
detect-client-opacity = true;

unredir-if-possible = false;
detect-transient = true;
detect-client-leader = true;

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.75; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.8; }
  dropdown_menu = { opacity = 0.8; }
};
