# --- Backend (Switching to xrender to fix workspace 2 rendering) ---
backend = "glx";
use-damage = true;
vsync = true;

# --- Corners (Performance Adjusted) ---
# Reduced radius for better rendering performance
corner-radius = 8;

# --- Shadows (Optimized for Visibility) ---
shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.75;

# === ADD THESE EXCLUSIONS HERE ===
# This stops Conky from ghosting/double-printing
shadow-exclude = [
  "class_g = 'Conky'"
];

blur-background-exclude = [
  "class_g = 'Conky'"
];

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Conky'"
];

# --- Specific Rules for i3 ---
detect-rounded-corners = true;
detect-client-opacity = true;

unredir-if-possible = false;
detect-transient = true;
detect-client-leader = true;

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.75; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.8; }
  dropdown_menu = { opacity = 0.8; }
};
