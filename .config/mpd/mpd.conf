# Files and directories
music_directory    "/home/hacker4hire/Music"
playlist_directory "~/.config/mpd/playlists"
db_file            "~/.config/mpd/database"
log_file           "~/.config/mpd/log"
pid_file           "~/.config/mpd/pid"
state_file         "~/.config/mpd/state"

# Resource Limitations (The "Too Large" Fix)
max_playlist_length     "65536"
max_command_list_size   "16384"
max_output_buffer_size  "32768"

# General
restore_paused          "yes"
auto_update             "yes"

# Audio Output for EndeavourOS/PipeWire
audio_output {
    type    "pipewire"
    name    "PipeWire Output"
}

# Visualizer support (for ncmpcpp)
audio_output {
    type    "fifo"
    name    "my_fifo"
    path    "/tmp/mpd.fifo"
    format  "44100:16:2"
}
