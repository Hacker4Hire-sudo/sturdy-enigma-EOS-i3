[colors]
background = #383C4A
background-alt = #8B8B8B
foreground = #FFFFFF
primary = #E345FF
secondary = #5294E2
alert = #E53935
disabled = #B0B5BD
pill-bg = #383C4A
white = #ffffff
black = #000000

[bar/base]
height = 32pt
radius = 16
background = ${colors.pill-bg}
foreground = ${colors.foreground}
line-size = 3pt
border-size = 4pt
border-color = #00000000
padding-left = 2
padding-right = 2
module-margin = 1
font-0 = "Noto Sans:style=Bold:size=14;4"
font-1 = "Font Awesome 7 Free:style=Solid:size=14;4"
font-2 = "Font Awesome 7 Brands:size=14;4"
font-3 = "Noto Color Emoji:scale=10;4"
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
override-redirect = true
wm-restack = i3

[bar/left]
inherit = bar/base
width = 12%
offset-x = 1%
offset-y = 10
modules-left = i3

[bar/stats]
inherit = bar/base
width = 14%
offset-x = 13.5%
offset-y = 10
modules-center = cpu memory

[bar/weather]
inherit = bar/base
width = 10%
offset-x = 28%
offset-y = 10
modules-center = weather

[bar/apps]
inherit = bar/base
width = 10%
offset-x = 38.5%
offset-y = 10
modules-center = esword

[bar/center]
inherit = bar/base
width = 18%
offset-x = 54%
offset-y = 10
modules-center = music

[bar/right]
inherit = bar/base
width = 25%
offset-x = 74%
offset-y = 10
modules-right = battery backlight pulseaudio tray date

[module/esword]
type = custom/text
label = " ✝ Bible "
label-foreground = ${colors.primary}
click-left = /home/hacker4hire/AI/life_bible_launcher.sh

[module/backlight]
type = custom/script
exec = brightnessctl -m | cut -d, -f4
interval = 1
format = <label>
label = " %output%"
label-foreground = ${colors.primary}
scroll-up = brightnessctl set 5%+
scroll-down = brightnessctl set 5%-
label-font = 1

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = false
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = true

label-focused = ""
label-focused-foreground = ${colors.primary}
label-focused-padding = 1

label-unfocused = ""
label-unfocused-foreground = ${colors.disabled}
label-unfocused-padding = 1

label-urgent = ""
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 1

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage%%
label-font = 1

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage_used%%
label-font = 1

[module/weather]
type = custom/script
exec = ~/.config/polybar/weather.sh
interval = 600
label = %output%
label-foreground = ${colors.primary}

[module/music]
type = custom/script
exec = ~/.config/polybar/music.sh
tail = true
click-left = playerctl -i kdeconnect play-pause 2>/dev/null || mpc toggle
click-right = playerctl -i kdeconnect next 2>/dev/null || mpc next
double-click-left = playerctl -i kdeconnect previous 2>/dev/null || mpc prev
label = %output%
label-maxlen = 30

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = ADP0
poll-interval = 5
format-charging = <label-charging>
format-discharging = <label-discharging>
label-charging = " %percentage%%"
label-discharging = " %percentage%%"
label-full = " 100%"

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
label-volume = " %percentage%%"
label-muted = ""
label-muted-foreground = ${colors.disabled}

[module/tray]
type = internal/tray
tray-spacing = 8px
tray-background = ${colors.pill-bg}

[module/date]
type = internal/date
interval = 1
date = %I:%M %p
label = %date%
label-foreground = ${colors.primary}
