[colors]
background = #383C4A
background-alt = #8B8B8B
foreground = #FFFFFF
primary = #E345FF
secondary = #5294E2
alert = #E53935
disabled = #B0B5BD
gray = #8B8B8B

[bar/main]
width = 100%
height = 28pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-color = #00000000

padding-left = 1
padding-right = 1

module-margin = 1

font-0 = "Noto Sans:style=Bold:size=14;3"
font-1 = "FontAwesome:size=14;3"
font-2 = "Font Awesome 6 Free:style=Solid:size=14;3"
font-3 = "Font Awesome 6 Brands:size=14;3"
font-4 = "Noto Color Emoji:scale=9;3"

modules-left = i3 memory cpu temperature fs-root
modules-center = date weather
modules-right = bible vitals network battery pulseaudio music tray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/tray]
type = internal/tray
tray-spacing = 8px

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = false
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = true

label-focused = %name%
label-focused-background = ${colors.background-alt}
label-focused-underline= ${colors.primary}
label-focused-padding = 1

label-unfocused = %name%
label-unfocused-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used%% %{F#B0B5BD}(%gb_free% free)%{F-}

[module/fs-root]
type = internal/fs
mount-0 = /
interval = 30
fixed-values = true
format-mounted-prefix = "SSD "
format-mounted-prefix-foreground = ${colors.primary}
label-mounted = %free%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/temperature]
type = internal/temperature
interval = 1
hwmon-path = ${env:HWMON_PATH}
format = <label>
format-warn = <label-warn>
label = Temp %temperature-c%
label-warn = Temp %temperature-c%
label-warn-foreground = ${colors.alert}

[module/date]
type = internal/date
interval = 1
date = %I:%M %p
date-alt = %m-%d-%Y %I:%M:%S %p
label = %date%
label-foreground = ${colors.primary}

[module/weather]
type = custom/script
exec = ~/.config/polybar/weather.sh
interval = 600
label = %output%

[module/bible]
type = custom/text
label = " ✝ Bible "
label-foreground = ${colors.primary}
click-left = /home/hacker4hire/AI/bible_launcher.sh

[module/vitals]
type = custom/script
exec = free -h | awk '/Mem:/ {print "RAM " $3 "/" $2}'
interval = 5
label = %output%
label-foreground = ${colors.secondary}

[module/network]
type = internal/network
interface = wlan0
interface-type = wireless
interval = 1.0
format-connected = <label-connected>
label-connected = %{F#E345FF}NET%{F-} %downspeed% ⬇ %upspeed% ⬆
label-disconnected = disconnected
label-disconnected-foreground = ${colors.disabled}

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = ADP0
poll-interval = 5
format-charging = <label-charging>
format-discharging = <label-discharging>
label-charging = %{F#E345FF}BAT%{F-} %percentage%% ⚡
label-discharging = %{F#E345FF}BAT%{F-} %percentage%%
label-full = %{F#E345FF}BAT%{F-} 100%

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
label-volume = %{F#E345FF}VOL%{F-} %percentage%%
label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/music]
type = custom/script
exec = ~/.config/polybar/music.sh
tail = true
click-left = playerctl play-pause || mpc toggle
double-click-left = playerctl next || mpc next
click-right = playerctl previous || mpc prev
label = %output%
