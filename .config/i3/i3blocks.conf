# i3blocks config file changed for EndeavourOS-i3 setup

# source is available here:
# https://raw.githubusercontent.com/endeavouros-team/endeavouros-i3wm-setup/main/etc/skel/.config/i3/i3blocks.conf
# Maintainer: joekamprad [joekamprad //a_t// endeavouros.com]
# Former Visual Designer: Florent Valetti [@FLVAL EndeavourOS]
# created for i3wm setup on EndeavourOS
# https://endeavouros.com

# cheatsheet for icon fonts used on the block-bar:
# https://fontawesome.com/v4.7/cheatsheet/

# --> to update this run the following command:
# wget --backups=1 https://raw.githubusercontent.com/endeavouros-team/endeavouros-i3wm-setup/main/etc/skel/.config/i3/i3blocks.conf -P ~/.config/i3/

# Please see man i3blocks for a complete reference!
# The man page is also hosted at http://vivien.github.io/i3blocks


# List of valid properties:
#
# align
# color
# command
# full_text
# instance
# interval
# label
# min_width
# name
# separator
# separator_block_width
# short_text
# signal
# urgent

# Global properties
#
# The top properties below are applied to every block, but can be overridden.
separator=false
markup=pango

[weather]
command=~/.config/i3/scripts/weather.sh
interval=1800
color=#50fa7b

[terminal]
full_text= 
color=#807dfe
command=i3-msg -q exec xfce4-terminal

[browser]
full_text= 
color=#ff7f81
command=i3-msg -q exec firefox

[files]
full_text= 
color=#7f3fbf
command=i3-msg -q exec thunar ~/

#[mail]
#full_text= 
#color=#dbcb75
#command=i3-msg -q exec thunderbird

[simple-2]
full_text=: :
color=#717171

# Disk usage
#
# The directory defaults to $HOME if the instance is not specified.
# The script may be called with a optional argument to set the alert
# (defaults to 10 for 10%).
[disk]
label= 
instance=/
command=~/.config/i3/scripts/disk
interval=30

# Memory usage
#
# The type defaults to "mem" if the instance is not specified.
[memory]
label= 
command=~/.config/i3/scripts/memory
interval=5

[zram]
label=󰾖 
command=zramctl | awk 'NR==2 {print $4}'
interval=5
color=#91ddff

[cpu_usage]
label= 
command=~/.config/i3/scripts/cpu_usage
interval=5
# This adds a background color if CPU is > 80%
color=#ffffff

[mode]
command=~/.local/bin/i3-mode
interval=2


[CPU-temperature]
label=
command=~/.local/bin/i3-temp
interval=30
signal=10
#T_WARN=70
#T_CRIT=90
#SENSOR_CHIP=""
# where SENSOR_CHIP can be find with sensors output
# can be used also for GPU temperature or other temperature sensors lm-sensors detects.

# showing name of connected network (enable for wifi use)
[net]
label=󰩠 
command=ip addr show wlan0 | grep -oP '(?<=inet\s)\d+(\.\d+){3}' | head -n 1
interval=60
color=#91ddff

[bandwidth]
command=~/.config/i3/scripts/bandwidth2
interval=persist

#[vpn]
#command=~/.config/i3/scripts/vpn
#init_color=#FFFF00
#on_color=#00FF00
#label=VPN:
#interval=5

# Battery indicator
[battery]
command=~/.config/i3/scripts/battery
# change this to battery-pinebook-pro if you are running on pinebook-pro
label=
interval=30

[simple-2]
full_text=: :
color=#717171

[pavucontrol]
full_text=♪
command=pavucontrol

[volume]
command=~/.config/i3/scripts/volume
interval=2

# display keyboard layout name
# for keyboard layouts switcher
# see i3 config file
# this needs xkblayout-state installed from the AUR:
# https://aur.archlinux.org/packages/xkblayout-state-git
#[keyboard-layout]
#command=~/.config/i3/scripts/keyboard-layout
#interval=2

[keybindings]
full_text= 
command=~/.config/i3/scripts/keyhint

# power-profiles-daemon implementation:
# needs package power-profiles-daemon installed and the service running see here:
# https://wiki.archlinux.org/title/CPU_frequency_scaling#power-profiles-daemon

#set power-profile
[ppd_menu]
full_text=
command=~/.config/i3/scripts/power-profiles
color=#407437

#Show the current power-profile
[ppd-status]
command=~/.config/i3/scripts/ppd-status
interval=5

[time]
#label=
command=date '+%a %d %b %-I:%M %p'
interval=1

[shutdown_menu]
full_text= 
command=~/.config/i3/scripts/powermenu

[simple-2]
full_text=: :
color=#717171

[music]
label= 
# We only trigger 'mpc' if the button pressed is 1 (Left), 2 (Middle), or 3 (Right)
command=mpc current | cut -c 1-25; [[ -n "$BLOCK_BUTTON" ]] && [[ "$BLOCK_BUTTON" -le 3 ]] && ( [[ "$BLOCK_BUTTON" -eq 1 ]] && mpc toggle || mpc next )
interval=2
color=#82AAFF
