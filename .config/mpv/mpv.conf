# === 2026 Hacking-Station MPV Optimization ===
# Target: Intel Tiger Lake (11th Gen i3-1115G4)
# RAM: 4GB DDR4 (Prioritize stability & cache)

# --- Hardware Acceleration (VA-API for Intel) ---
# vaapi is standard for Intel on Linux via Mesa (iris driver)
hwdec=vaapi
vo=gpu
gpu-api=opengl
gpu-context=x11egl

# --- High-Performance Buffering (Anti-Stutter) ---
# Increasing cache to prevent IPTV drops on 4GB RAM
cache=yes
cache-secs=600
cache-pause=yes
cache-pause-initial=yes
cache-pause-wait=10
demuxer-thread=yes
demuxer-max-bytes=512MiB
demuxer-max-back-bytes=256MiB
demuxer-readahead-secs=300
network-timeout=60

# --- IPTV Specific Protocol Tuning ---
# Reconnection logic is vital for IPTV links that might timeout
stream-lavf-o=reconnect=1,reconnect_at_eof=1,reconnect_streamed=1,reconnect_delay_max=5
user-agent="VLC/3.0.18 LibVLC/3.0.18"
hls-bitrate=max
tls-verify=no

# --- UI & Experience ---
hr-seek=yes
save-position-on-quit=yes
watch-later-directory=~/.config/mpv/watch_later
msg-level=all=warn
osd-font='Noto Sans'
osd-font-size=24

# --- Performance Shifters ---
# Disable high-quality scalers if you experience dropped frames
# scale=bilinear
# cscale=bilinear
# dscale=bilinear
